<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wishlist — Velura</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.wl-wrap{padding:36px 48px 72px;max-width:1320px;margin:0 auto}
.wl-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:28px;flex-wrap:wrap;gap:12px}
.wl-hdr h2{font-family:var(--font-display);font-size:1.7rem;font-weight:400}
.wl-hdr p{font-size:.72rem;color:var(--slate);margin-top:4px}
.wl-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;position:relative}
.wl-remove-btn{
  position:absolute;top:8px;right:8px;z-index:5;
  width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;
  background:var(--ink);color:var(--white);
  display:flex;align-items:center;justify-content:center;
  font-size:.72rem;transition:background var(--t);
}
.wl-remove-btn:hover{background:var(--danger)}
.wl-card-wrap{position:relative}
.empty-state{text-align:center;padding:80px 20px}
.empty-state .icon{font-size:4rem;margin-bottom:18px;opacity:.28}
.empty-state h2{font-family:var(--font-display);font-size:2rem;font-weight:400;margin-bottom:8px}
.empty-state p{font-size:.75rem;color:var(--slate);margin-bottom:28px}
@media(max-width:1024px){.wl-grid{grid-template-columns:repeat(3,1fr)}.wl-wrap{padding:24px 24px 48px}}
@media(max-width:768px){.wl-grid{grid-template-columns:repeat(2,1fr)}.wl-wrap{padding:16px 16px 40px}}
</style>
</head>
<body data-page="">
<div id="site-nav"></div>
<div class="page-hero">
  <div class="container">
    <div class="page-hero-inner anim-1">
      <div class="page-hero-tag">My Wishlist</div>
      <h1>Saved <em>Items</em></h1>
      <div class="breadcrumb"><a href="../index.html">Home</a><span class="sep">/</span><span>Wishlist</span></div>
    </div>
  </div>
</div>
<div class="wl-wrap" id="wlWrap"></div>
<div id="site-footer"></div>
<script src="../js/app.js"></script>
<script>
function renderWL(){
  const ids=getWish();const items=PRODUCTS.filter(p=>ids.includes(p.id));
  const el=document.getElementById('wlWrap');
  if(!items.length){
    el.innerHTML=`<div class="empty-state"><div class="icon">♡</div><h2>Your wishlist is empty</h2><p>Save items you love and find them here</p><a href="shop.html" class="btn btn-amber">Start Shopping</a></div>`;
    return;
  }
  el.innerHTML=`<div class="wl-hdr"><div><h2>My Wishlist</h2><p>${items.length} saved item${items.length!==1?'s':''}</p></div><button class="btn btn-outline btn-sm" onclick="clearWL()">Clear All</button></div>
  <div class="wl-grid">${items.map(p=>`<div class="wl-card-wrap">${productCard(p)}<button class="wl-remove-btn" onclick="rmWL(${p.id})" title="Remove">✕</button></div>`).join('')}</div>`;
}
function rmWL(id){toggleWish(id);toast('Removed from wishlist');renderWL()}
function clearWL(){localStorage.removeItem('v_wish');toast('Wishlist cleared');renderWL()}
renderWL();
</script>
</body>
</html>
