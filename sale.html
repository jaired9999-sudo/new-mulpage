<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sale — Up to 50% Off — Velura</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.sale-hero{
  height:420px;
  background:linear-gradient(135deg,#1a0000 0%,#3a0808 55%,#1a0808 100%);
  display:flex;align-items:center;justify-content:center;text-align:center;
  position:relative;overflow:hidden;
}
.sale-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 45%,rgba(192,57,43,.22) 0%,transparent 60%)}
.sh-inner{position:relative;z-index:1}
.sh-inner .ey{font-size:.6rem;font-weight:700;letter-spacing:.32em;text-transform:uppercase;color:var(--amber-lt);margin-bottom:14px}
.sh-inner h1{font-family:var(--font-display);font-size:clamp(3rem,7vw,6rem);font-weight:700;color:var(--white);line-height:.9;letter-spacing:-.01em}
.sh-inner h1 span{color:#ff7c7c;font-style:italic}
.countdown{display:flex;gap:20px;justify-content:center;margin-top:22px}
.cd-item{text-align:center}
.cd-num{font-family:var(--font-display);font-size:2.2rem;font-weight:700;color:var(--white);line-height:1}
.cd-lbl{font-size:.54rem;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.42);margin-top:2px}
.cd-sep{font-size:1.5rem;color:rgba(255,255,255,.25);line-height:2.4}
.filter-bar{
  background:var(--white);border-bottom:1px solid var(--border);
  display:flex;gap:8px;flex-wrap:wrap;align-items:center;
  padding:14px 48px;
}
.f-chip{
  padding:7px 16px;border:1px solid var(--border);border-radius:20px;
  font-size:.65rem;font-weight:600;letter-spacing:.06em;cursor:pointer;
  transition:all .2s;background:var(--white);color:var(--ink-soft);
}
.f-chip:hover,.f-chip.on{background:var(--ink);color:var(--white);border-color:var(--ink)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 48px;flex-wrap:wrap;gap:10px;background:var(--mist);border-bottom:1px solid var(--border)}
.sort-sel{border:1px solid var(--border);padding:7px 12px;font-size:.72rem;background:var(--white);outline:none;cursor:pointer;border-radius:var(--r);color:var(--ink)}
.prods{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:0 48px 72px}
@media(max-width:1024px){.prods{grid-template-columns:repeat(3,1fr);padding:0 24px 48px}.topbar,.filter-bar{padding-left:24px;padding-right:24px}}
@media(max-width:768px){.prods{grid-template-columns:repeat(2,1fr);padding:0 12px 36px}.topbar,.filter-bar{padding:12px 16px}}
</style>
</head>
<body data-page="Sale">
<div id="site-nav"></div>
<div class="sale-hero">
  <div class="sh-inner anim-1">
    <div class="ey">✦ Limited Time Offer ✦</div>
    <h1>UP TO <span>50%</span><br>OFF</h1>
    <div class="countdown" id="cd"></div>
  </div>
</div>
<div class="filter-bar">
  <span style="font-size:.62rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--slate);margin-right:4px">Filter:</span>
  <div class="f-chip on" onclick="setF('all',this)">All Sale</div>
  <div class="f-chip" onclick="setF('women',this)">Women</div>
  <div class="f-chip" onclick="setF('men',this)">Men</div>
  <div class="f-chip" onclick="setF('accessories',this)">Accessories</div>
  <div class="f-chip" onclick="setF('d20',this)">20%+ Off</div>
  <div class="f-chip" onclick="setF('d30',this)">30%+ Off</div>
</div>
<div class="topbar">
  <div style="font-size:.72rem;color:var(--slate)"><strong id="cnt" style="color:var(--ink)">0</strong> sale items</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate)">Sort:</span>
    <select class="sort-sel" onchange="renderS(this.value)">
      <option value="dis">Best Discount</option>
      <option value="pa">Price: Low → High</option>
      <option value="pd">Price: High → Low</option>
      <option value="rat">Top Rated</option>
    </select>
  </div>
</div>
<div class="prods" id="sGrid"></div>
<div id="site-footer"></div>
<script src="../js/app.js"></script>
<script>
let filt='all';
function setF(v,el){filt=v;document.querySelectorAll('.f-chip').forEach(c=>c.classList.remove('on'));el.classList.add('on');renderS()}
function renderS(sort='dis'){
  let list=PRODUCTS.filter(p=>!!p.old);
  if(filt==='women')list=list.filter(p=>p.cat==='women');
  else if(filt==='men')list=list.filter(p=>p.cat==='men');
  else if(filt==='accessories')list=list.filter(p=>p.cat==='accessories');
  else if(filt==='d30')list=list.filter(p=>disc(p.price,p.old)>=30);
  else if(filt==='d20')list=list.filter(p=>disc(p.price,p.old)>=20);
  if(sort==='dis')list.sort((a,b)=>disc(b.price,b.old)-disc(a.price,a.old));
  else if(sort==='pa')list.sort((a,b)=>a.price-b.price);
  else if(sort==='pd')list.sort((a,b)=>b.price-a.price);
  else if(sort==='rat')list.sort((a,b)=>b.rating-a.rating);
  document.getElementById('cnt').textContent=list.length;
  document.getElementById('sGrid').innerHTML=list.length?list.map(productCard).join(''):`<div style="grid-column:1/-1;text-align:center;padding:60px;font-family:var(--font-display);font-size:1.6rem;color:var(--slate)">No sale items for this filter</div>`;
}
function tick(){
  const d=new Date();d.setHours(d.getHours()+47,d.getMinutes()+18,0,0);
  const diff=Math.max(0,d-new Date());
  const h=Math.floor(diff/3600000),m=Math.floor(diff%3600000/60000),s=Math.floor(diff%60000/1000);
  document.getElementById('cd').innerHTML=`<div class="cd-item"><div class="cd-num">${String(h).padStart(2,'0')}</div><div class="cd-lbl">Hours</div></div><div class="cd-sep">:</div><div class="cd-item"><div class="cd-num">${String(m).padStart(2,'0')}</div><div class="cd-lbl">Mins</div></div><div class="cd-sep">:</div><div class="cd-item"><div class="cd-num">${String(s).padStart(2,'0')}</div><div class="cd-lbl">Secs</div></div>`;
}
tick();setInterval(tick,1000);
renderS();
</script>
</body>
</html>
