<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Accessories — Velura</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.cat-hero{height:380px;background:linear-gradient(135deg,#1a1508 0%,#0a0a0a 55%,#1a1208 100%);display:flex;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden}
.cat-hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 50%,rgba(200,136,58,.14) 0%,transparent 60%)}
.ch-inner{position:relative;z-index:1}
.ch-inner .ey{font-size:.6rem;font-weight:600;letter-spacing:.34em;text-transform:uppercase;color:var(--amber-lt);margin-bottom:12px}
.ch-inner h1{font-family:var(--font-display);font-size:clamp(2.4rem,6vw,4.8rem);font-weight:400;color:var(--white);line-height:.95}
.ch-inner h1 em{font-style:italic;color:var(--amber-lt)}
.ch-inner p{color:rgba(255,255,255,.42);font-size:.72rem;letter-spacing:.16em;margin-top:12px;text-transform:uppercase}
.sub-tabs{background:var(--white);border-bottom:1px solid var(--border);display:flex;overflow-x:auto;padding:0;scrollbar-width:none}
.sub-tabs::-webkit-scrollbar{display:none}
.sub-tab{padding:14px 22px;white-space:nowrap;font-size:.66rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--slate);border-bottom:2px solid transparent;cursor:pointer;transition:all .2s}
.sub-tab:hover{color:var(--ink)}.sub-tab.on{color:var(--amber);border-bottom-color:var(--amber)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:18px 48px;flex-wrap:wrap;gap:10px;background:var(--mist);border-bottom:1px solid var(--border)}
.sort-sel{border:1px solid var(--border);padding:7px 12px;font-size:.72rem;background:var(--white);outline:none;cursor:pointer;border-radius:var(--r);color:var(--ink)}
.prods{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:0 48px 72px}
@media(max-width:1024px){.prods{grid-template-columns:repeat(3,1fr);padding:0 24px 48px}.topbar{padding:14px 24px}}
@media(max-width:768px){.prods{grid-template-columns:repeat(2,1fr);padding:0 12px 36px}.topbar{padding:12px 16px}}
</style>
</head>
<body data-page="Accessories">
<div id="site-nav"></div>
<div class="cat-hero">
  <div class="ch-inner anim-1">
    <div class="ey">Curated Accessories</div>
    <h1>Jewellery &<br><em>Accessories</em></h1>
    <p>Jewellery · Bags · Scarves · More</p>
  </div>
</div>
<div class="sub-tabs">
  <div class="sub-tab on" onclick="pick('all',this)">All</div>
  <div class="sub-tab" onclick="pick('jewellery',this)">Jewellery</div>
  <div class="sub-tab" onclick="pick('bags',this)">Bags</div>
  <div class="sub-tab" onclick="pick('scarves',this)">Scarves & Shawls</div>
</div>
<div class="topbar">
  <div style="font-size:.72rem;color:var(--slate)"><strong id="cnt" style="color:var(--ink)">0</strong> products</div>
  <div style="display:flex;align-items:center;gap:8px">
    <span style="font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate)">Sort:</span>
    <select class="sort-sel" onchange="renderA(this.value)">
      <option value="">Featured</option>
      <option value="pa">Price: Low → High</option>
      <option value="pd">Price: High → Low</option>
      <option value="rat">Top Rated</option>
    </select>
  </div>
</div>
<div class="prods" id="aGrid"></div>
<div id="site-footer"></div>
<script src="../js/app.js"></script>
<script>
let activeSub='all';
function pick(s,el){activeSub=s;document.querySelectorAll('.sub-tab').forEach(t=>t.classList.remove('on'));if(el)el.classList.add('on');renderA()}
function renderA(sort=''){
  let list=activeSub==='all'?PRODUCTS.filter(p=>p.cat==='accessories'):PRODUCTS.filter(p=>p.cat==='accessories'&&p.sub===activeSub);
  if(sort==='pa')list.sort((a,b)=>a.price-b.price);else if(sort==='pd')list.sort((a,b)=>b.price-a.price);else if(sort==='rat')list.sort((a,b)=>b.rating-a.rating);
  document.getElementById('cnt').textContent=list.length;
  document.getElementById('aGrid').innerHTML=list.length?list.map(productCard).join(''):`<div style="grid-column:1/-1;text-align:center;padding:60px;font-family:var(--font-display);font-size:1.6rem;color:var(--slate)">No products found</div>`;
}
renderA();
</script>
</body>
</html>
