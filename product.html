<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product — Velura</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.pd-wrap{display:grid;grid-template-columns:1fr 1fr;min-height:80vh;background:var(--white);align-items:start}
.pd-gallery{
  position:sticky;top:60px;height:calc(100vh - 60px);
  background:linear-gradient(145deg,var(--sand) 0%,var(--warm-dark) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;
}
.pd-main-emoji{font-size:10rem;filter:drop-shadow(0 16px 40px rgba(0,0,0,.12));transition:transform .4s var(--ease);cursor:pointer}
.pd-main-emoji:hover{transform:scale(1.05) rotate(-2deg)}
.pd-thumbs{display:flex;gap:8px}
.pd-thumb{
  width:52px;height:52px;border:2px solid transparent;border-radius:var(--r);
  background:rgba(255,255,255,.7);display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;cursor:pointer;transition:border-color .2s;
}
.pd-thumb.on,.pd-thumb:hover{border-color:var(--amber)}
.pd-info{padding:44px 48px;overflow-y:auto;max-height:calc(100vh - 60px)}
.pd-brand{font-size:.62rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin-bottom:7px}
.pd-name{font-family:var(--font-display);font-size:2.2rem;font-weight:400;line-height:1.1;margin-bottom:12px}
.pd-stars-row{display:flex;align-items:center;gap:10px;margin-bottom:18px;flex-wrap:wrap}
.pd-stars{color:#e5a020;font-size:.9rem}
.pd-rval{font-size:.75rem;font-weight:600}
.pd-rcount{font-size:.68rem;color:var(--slate)}
.pd-price-row{display:flex;align-items:baseline;gap:12px;margin-bottom:6px;flex-wrap:wrap}
.pd-price{font-size:1.7rem;font-weight:600}
.pd-old{font-size:.95rem;color:var(--slate);text-decoration:line-through}
.pd-disc-badge{padding:3px 10px;background:var(--success);color:var(--white);font-size:.64rem;font-weight:700;border-radius:var(--r)}
.pd-saving{font-size:.7rem;color:var(--success);font-weight:500;margin-bottom:22px}
.pd-divider{border:none;border-top:1px solid var(--border);margin:20px 0}
.pd-lbl{font-size:.62rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-bottom:10px}
.size-grid{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:6px}
.sz{
  padding:7px 15px;border:1px solid var(--border);border-radius:var(--r);
  font-size:.72rem;letter-spacing:.04em;cursor:pointer;transition:all .15s;background:var(--white);
}
.sz:hover{border-color:var(--ink)}
.sz.on{background:var(--ink);color:var(--white);border-color:var(--ink)}
.sz.na{opacity:.3;cursor:not-allowed;text-decoration:line-through}
.size-guide{font-size:.63rem;color:var(--amber);text-decoration:underline;cursor:pointer;letter-spacing:.04em}
.color-row{display:flex;gap:10px;margin-bottom:22px}
.clr{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .15s;position:relative;
}
.clr.on{border-color:var(--amber);transform:scale(1.15)}
.clr.on::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--amber);opacity:.7}
.qty-row{display:flex;align-items:center;gap:10px;margin-bottom:22px}
.qty-btn{
  width:34px;height:34px;border:1px solid var(--border);border-radius:var(--r);
  display:flex;align-items:center;justify-content:center;font-size:1.1rem;
  cursor:pointer;font-weight:300;transition:all .15s;background:var(--white);
}
.qty-btn:hover{background:var(--ink);color:var(--white);border-color:var(--ink)}
.qty-val{font-size:.85rem;font-weight:600;min-width:26px;text-align:center}
.pd-actions{display:flex;gap:10px;margin-bottom:18px}
.pd-atc{flex:1;padding:15px}
.pd-wish-btn{
  padding:15px 18px;border:1px solid var(--border);background:var(--white);
  font-size:1.15rem;cursor:pointer;transition:all .2s;border-radius:var(--r);
}
.pd-wish-btn:hover,.pd-wish-btn.on{border-color:var(--danger);color:var(--danger)}
.pd-badges{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:22px}
.pd-badge-item{display:flex;align-items:center;gap:5px;font-size:.64rem;color:var(--slate)}
.pd-badge-item .i{font-size:.95rem}
.pd-desc{font-size:.75rem;line-height:1.9;color:var(--slate);margin-bottom:22px}
.acc{border-top:1px solid var(--border)}
.acc-item{border-bottom:1px solid var(--border)}
.acc-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:13px 0;cursor:pointer;transition:color .2s;
  font-size:.72rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
}
.acc-head:hover{color:var(--amber)}
.acc-arrow{transition:transform .25s;font-size:.75rem}
.acc-head.open .acc-arrow{transform:rotate(180deg)}
.acc-body{display:none;padding:0 0 14px;font-size:.73rem;line-height:1.85;color:var(--slate)}
.acc-body.open{display:block}
.related{padding:64px 0}
.related-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;margin-top:28px}
@media(max-width:900px){
  .pd-wrap{grid-template-columns:1fr}
  .pd-gallery{position:static;height:320px}
  .pd-info{padding:24px 20px;max-height:none}
  .pd-name{font-size:1.7rem}
  .related-grid{grid-template-columns:repeat(2,1fr)}
  .related{padding:36px 0}
}
</style>
</head>
<body data-page="Shop">
<div id="site-nav"></div>

<div style="background:var(--white);border-bottom:1px solid var(--border);padding:14px 48px">
  <div class="breadcrumb" id="bc">
    <a href="../index.html">Home</a><span class="sep">/</span>
    <a href="shop.html">Shop</a><span class="sep">/</span>
    <span id="bc-name">Product</span>
  </div>
</div>

<div class="pd-wrap" id="pdWrap">
  <div style="display:flex;align-items:center;justify-content:center;min-height:400px;color:var(--slate)">Loading…</div>
</div>

<section class="related">
  <div class="container">
    <div class="sec-head"><div class="kicker">You May Also Like</div><h2>Related <em>Products</em></h2><div class="rule"></div></div>
    <div class="related-grid" id="relGrid"></div>
  </div>
</section>

<div id="site-footer"></div>
<script src="../js/app.js"></script>
<script>
const pid=parseInt(new URLSearchParams(location.search).get('id'));
let p=PRODUCTS.find(x=>x.id===pid)||PRODUCTS[0];
let selSize=p.sizes[0],selClr=0,qty=1;

function render(){
  document.title=p.name+' — Velura';
  document.getElementById('bc-name').textContent=p.name;
  const d=disc(p.price,p.old);
  const w=isWished(p.id);
  document.getElementById('pdWrap').innerHTML=`
    <div class="pd-gallery">
      <div class="pd-main-emoji">${p.emoji}</div>
      <div class="pd-thumbs">
        ${['🔍','💫','📦'].map((e,i)=>`<div class="pd-thumb${i===0?' on':''}">${e}</div>`).join('')}
      </div>
    </div>
    <div class="pd-info anim-1">
      <div class="pd-brand">${p.brand}</div>
      <h1 class="pd-name">${p.name}</h1>
      <div class="pd-stars-row">
        <span class="pd-stars">${stars(p.rating)}</span>
        <span class="pd-rval">${p.rating}</span>
        <span class="pd-rcount">${p.rev} reviews</span>
      </div>
      <div class="pd-price-row">
        <span class="pd-price">${inr(p.price)}</span>
        ${p.old?`<span class="pd-old">${inr(p.old)}</span><span class="pd-disc-badge">${d}% OFF</span>`:''}
      </div>
      ${p.old?`<div class="pd-saving">✓ You save ${inr(p.old-p.price)} on this item</div>`:''}
      <hr class="pd-divider">
      <div class="pd-lbl">Select Size <span class="size-guide">Size Guide</span></div>
      <div class="size-grid" id="szGrid">
        ${p.sizes.map(s=>`<button class="sz${s===selSize?' on':''}" onclick="pickSz('${s}')">${s}</button>`).join('')}
      </div>
      <hr class="pd-divider">
      <div class="pd-lbl">Colour</div>
      <div class="color-row" id="clrRow">
        ${p.colors.map((c,i)=>`<button class="clr${i===selClr?' on':''}" style="background:${c}" onclick="pickClr(${i})" title="${c}"></button>`).join('')}
      </div>
      <div class="pd-lbl">Quantity</div>
      <div class="qty-row">
        <button class="qty-btn" onclick="chgQty(-1)">−</button>
        <span class="qty-val" id="qVal">1</span>
        <button class="qty-btn" onclick="chgQty(1)">+</button>
      </div>
      <div class="pd-actions">
        <button class="btn btn-amber pd-atc" onclick="doAdd()">Add to Cart</button>
        <button class="pd-wish-btn${w?' on':''}" id="wBtn" onclick="doWish()">${w?'♥':'♡'}</button>
      </div>
      <a href="cart.html" class="btn btn-dark btn-full" onclick="doAdd()" style="margin-bottom:18px">Buy Now</a>
      <div class="pd-badges">
        <div class="pd-badge-item"><span class="i">🚚</span>Free delivery above ₹2,000</div>
        <div class="pd-badge-item"><span class="i">↩</span>15-day returns</div>
        <div class="pd-badge-item"><span class="i">✓</span>100% authentic</div>
        <div class="pd-badge-item"><span class="i">🔒</span>Secure payment</div>
      </div>
      <hr class="pd-divider">
      <p class="pd-desc">${p.desc}</p>
      <div class="acc">
        ${[['Product Details','Premium quality materials. Quality-checked before dispatch. Sustainable packaging used.'],
           ['Size & Fit','Follows standard Indian sizing. For the best fit, refer to our size guide. Model wears size M/UK 8.'],
           ['Shipping','Free shipping above ₹2,000. Standard: 5–7 business days. Express: 2–3 days. Same-day in select cities.'],
           ['Returns','15-day easy returns. Item must be unused with tags intact. Refund in 5–7 business days after pickup.'],
        ].map(([t,b])=>`<div class="acc-item"><div class="acc-head" onclick="tog(this)">${t}<span class="acc-arrow">▾</span></div><div class="acc-body">${b}</div></div>`).join('')}
      </div>
    </div>`;
}
function pickSz(s){selSize=s;document.querySelectorAll('.sz').forEach(b=>b.classList.toggle('on',b.textContent===s))}
function pickClr(i){selClr=i;document.querySelectorAll('.clr').forEach((b,j)=>b.classList.toggle('on',j===i))}
function chgQty(d){qty=Math.max(1,qty+d);document.getElementById('qVal').textContent=qty}
function doAdd(){addToCart(p.id,selSize,p.colors[selClr],qty)}
function doWish(){const on=toggleWish(p.id);const b=document.getElementById('wBtn');b.textContent=on?'♥':'♡';b.classList.toggle('on',on);toast(on?'♥ Saved to Wishlist':'Removed from Wishlist')}
function tog(h){const b=h.nextElementSibling;const isO=b.classList.contains('open');document.querySelectorAll('.acc-body').forEach(x=>x.classList.remove('open'));document.querySelectorAll('.acc-head').forEach(x=>x.classList.remove('open'));if(!isO){b.classList.add('open');h.classList.add('open')}}

render();
document.addEventListener('DOMContentLoaded',()=>{
  const rel=PRODUCTS.filter(x=>x.cat===p.cat&&x.id!==p.id).slice(0,4);
  document.getElementById('relGrid').innerHTML=rel.map(productCard).join('');
});
</script>
</body>
</html>
