<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shop All — Velura</title>
<link rel="stylesheet" href="style.css">
<style>
.qf-bar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;background:var(--white);border-bottom:1px solid var(--border);padding:11px 48px}
.qchip{padding:6px 14px;border:1px solid var(--border);border-radius:20px;font-size:.64rem;font-weight:500;
       letter-spacing:.06em;cursor:pointer;transition:all .2s;background:var(--white);color:var(--ink2)}
.qchip:hover,.qchip.on{background:var(--ink);color:var(--white);border-color:var(--ink)}
.qchip.sale-qc.on{background:var(--red);border-color:var(--red)}
.shop-wrap{display:grid;grid-template-columns:236px 1fr;align-items:start}
.sb{background:var(--white);border-right:1px solid var(--border);padding:22px 18px;
    position:sticky;top:62px;max-height:calc(100vh - 62px);overflow-y:auto}
.sb-sec{margin-bottom:22px;border-bottom:1px solid var(--border);padding-bottom:19px}
.sb-sec:last-of-type{border-bottom:none}
.sb-ttl{font-size:.6rem;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--ink);margin-bottom:11px}
.sb-opt{display:flex;align-items:center;gap:8px;padding:7px 0;cursor:pointer;
        border-bottom:1px solid rgba(0,0,0,.04);font-size:.71rem}
.sb-opt:hover{color:var(--amber)}
.sb-opt input[type=checkbox]{width:13px;height:13px;accent-color:var(--amber);cursor:pointer;flex-shrink:0}
.sb-opt label{cursor:pointer;flex:1}
.sb-opt .n{font-size:.6rem;color:var(--slate)}
.price-r{display:flex;gap:7px;align-items:center;margin-bottom:8px}
.price-r input{flex:1;padding:8px 9px;border:1px solid var(--border);font-size:.71rem;text-align:center;outline:none;border-radius:3px}
.price-r input:focus{border-color:var(--amber)}
.price-r span{color:var(--slate)}
.sb-apply{width:100%;margin-top:5px;padding:8px;background:var(--ink);color:var(--white);
          font-size:.61rem;font-weight:600;letter-spacing:.14em;text-transform:uppercase;
          transition:background var(--t);border:none;cursor:pointer;border-radius:3px;font-family:var(--sans)}
.sb-apply:hover{background:var(--amber)}
.sb-clear{width:100%;padding:7px;background:transparent;color:var(--slate);border:1px solid var(--border);
          font-size:.61rem;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;margin-top:6px;
          transition:all .2s;border-radius:3px;font-family:var(--sans)}
.sb-clear:hover{border-color:var(--ink);color:var(--ink)}
.shop-main{padding:18px 26px}
.shop-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;
          padding-bottom:14px;border-bottom:1px solid var(--border);flex-wrap:wrap;gap:9px}
.res-txt{font-size:.71rem;color:var(--slate)}.res-txt strong{color:var(--ink)}
.s-sel{border:1px solid var(--border);padding:7px 11px;font-size:.71rem;background:var(--white);
       outline:none;cursor:pointer;border-radius:3px;color:var(--ink)}
.s-sel:focus{border-color:var(--amber)}
.act-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:13px}
.atag{display:flex;align-items:center;gap:5px;padding:3px 9px;background:var(--ink);color:var(--white);
      font-size:.59rem;letter-spacing:.08em;border-radius:3px}
.atag button{color:rgba(255,255,255,.55);font-size:.72rem;background:none;border:none;cursor:pointer;line-height:1}
.shop-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}
.no-res{grid-column:1/-1;text-align:center;padding:68px 20px}
.no-res p{font-family:var(--serif);font-size:1.65rem;font-weight:400;color:var(--slate);margin-bottom:14px}
.lm-row{text-align:center;padding:36px 0 14px}
.mob-filt-btn{display:none;align-items:center;gap:5px;padding:8px 15px;border:1px solid var(--border);
              background:var(--white);font-size:.67rem;font-weight:600;letter-spacing:.1em;border-radius:3px;cursor:pointer}
.mob-filt-btn:hover{border-color:var(--amber);color:var(--amber)}
@media(max-width:860px){
  .shop-wrap{grid-template-columns:1fr}
  .sb{display:none;position:static;max-height:none}.sb.mob-open{display:block}
  .mob-filt-btn{display:flex}
  .shop-grid{grid-template-columns:repeat(2,1fr)}
  .shop-main{padding:13px}
  .qf-bar{padding:9px 13px}
}
@media(max-width:480px){.shop-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body data-page="Shop">
<div id="site-nav"></div>

<div class="phero">
  <div class="wrap"><div class="phero-in a1">
    <div class="ptag">All Products</div>
    <h1>The <em>Collection</em></h1>
    <div class="bcrumb"><a href="index.html">Home</a><span class="sep">/</span><span>Shop</span></div>
  </div></div>
</div>

<div class="qf-bar">
  <span style="font-size:.59rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--slate)">Quick Filter:</span>
  <div class="qchip on" onclick="setQF('all',this)">All</div>
  <div class="qchip" onclick="setQF('women',this)">Women</div>
  <div class="qchip" onclick="setQF('men',this)">Men</div>
  <div class="qchip" onclick="setQF('acc',this)">Accessories</div>
  <div class="qchip" onclick="setQF('beauty',this)">Beauty</div>
  <div class="qchip sale-qc" onclick="setQF('sale',this)">🔖 Sale</div>
  <button class="mob-filt-btn" onclick="document.getElementById('sb').classList.toggle('mob-open')">⚙ Filters</button>
</div>

<div class="shop-wrap">
  <aside class="sb" id="sb">
    <div class="sb-sec">
      <div class="sb-ttl">Category</div>
      <div class="sb-opt"><input type="checkbox" id="ca" checked onchange="render()"><label for="ca">All</label></div>
      <div class="sb-opt"><input type="checkbox" id="cw" onchange="render()"><label for="cw">Women</label><span class="n">(8)</span></div>
      <div class="sb-opt"><input type="checkbox" id="cm" onchange="render()"><label for="cm">Men</label><span class="n">(5)</span></div>
      <div class="sb-opt"><input type="checkbox" id="cacc" onchange="render()"><label for="cacc">Accessories</label><span class="n">(4)</span></div>
      <div class="sb-opt"><input type="checkbox" id="cb" onchange="render()"><label for="cb">Beauty</label><span class="n">(3)</span></div>
    </div>
    <div class="sb-sec">
      <div class="sb-ttl">Price Range</div>
      <div class="price-r">
        <input id="pmin" placeholder="₹0" type="number" min="0">
        <span>–</span>
        <input id="pmax" placeholder="₹20000" type="number" min="0">
      </div>
      <button class="sb-apply" onclick="render()">Apply Price</button>
    </div>
    <div class="sb-sec">
      <div class="sb-ttl">Discount</div>
      <div class="sb-opt"><input type="checkbox" id="d10" onchange="render()"><label for="d10">10% or more</label></div>
      <div class="sb-opt"><input type="checkbox" id="d20" onchange="render()"><label for="d20">20% or more</label></div>
      <div class="sb-opt"><input type="checkbox" id="d30" onchange="render()"><label for="d30">30% or more</label></div>
    </div>
    <div class="sb-sec">
      <div class="sb-ttl">Rating</div>
      <div class="sb-opt"><input type="checkbox" id="r4" onchange="render()"><label for="r4">4★ &amp; above</label></div>
      <div class="sb-opt"><input type="checkbox" id="r45" onchange="render()"><label for="r45">4.5★ &amp; above</label></div>
    </div>
    <button class="sb-clear" onclick="clearAll()">Clear All Filters</button>
  </aside>
  <main class="shop-main">
    <div class="shop-top">
      <div class="res-txt">Showing <strong id="rc">0</strong> of <strong id="rt">0</strong> products</div>
      <div style="display:flex;align-items:center;gap:7px">
        <span style="font-size:.6rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--slate)">Sort:</span>
        <select class="s-sel" id="srt" onchange="render()">
          <option value="">Featured</option>
          <option value="pa">Price: Low → High</option>
          <option value="pd">Price: High → Low</option>
          <option value="rat">Top Rated</option>
          <option value="dis">Best Discount</option>
          <option value="nw">Newest</option>
        </select>
      </div>
    </div>
    <div class="act-tags" id="actTags"></div>
    <div class="shop-grid" id="shopG"></div>
    <div class="lm-row"><button class="btn btn-out" id="lmBtn" onclick="loadMore()">Load More</button></div>
  </main>
</div>

<div id="site-footer"></div>
<script src="app.js"></script>
<script>
let qf='all',shown=9;
const params=new URLSearchParams(location.search);
if(params.get('cat')){qf=params.get('cat');document.querySelectorAll('.qchip').forEach(c=>{c.classList.toggle('on',c.dataset.qf===qf||(!c.dataset.qf&&qf==='all'))})}
const sq=params.get('q')||'';
function setQF(v,el){qf=v;shown=9;document.querySelectorAll('.qchip').forEach(c=>c.classList.remove('on'));el.classList.add('on');render()}
function getFilt(){
  const pmin=parseInt(document.getElementById('pmin')?.value)||0;
  const pmax=parseInt(document.getElementById('pmax')?.value)||Infinity;
  const r4=document.getElementById('r4')?.checked,r45=document.getElementById('r45')?.checked;
  const d10=document.getElementById('d10')?.checked,d20=document.getElementById('d20')?.checked,d30=document.getElementById('d30')?.checked;
  let list=[...PRODUCTS];
  if(qf==='sale')list=list.filter(p=>!!p.old);
  else if(qf!=='all')list=list.filter(p=>p.cat===qf);
  if(sq)list=list.filter(p=>p.name.toLowerCase().includes(sq.toLowerCase())||p.brand.toLowerCase().includes(sq.toLowerCase()));
  list=list.filter(p=>p.price>=pmin&&p.price<=pmax);
  if(r45)list=list.filter(p=>p.rating>=4.5);else if(r4)list=list.filter(p=>p.rating>=4);
  if(d30)list=list.filter(p=>p.old&&pct(p.price,p.old)>=30);
  else if(d20)list=list.filter(p=>p.old&&pct(p.price,p.old)>=20);
  else if(d10)list=list.filter(p=>p.old&&pct(p.price,p.old)>=10);
  const s=document.getElementById('srt')?.value||'';
  if(s==='pa')list.sort((a,b)=>a.price-b.price);
  else if(s==='pd')list.sort((a,b)=>b.price-a.price);
  else if(s==='rat')list.sort((a,b)=>b.rating-a.rating);
  else if(s==='dis')list.sort((a,b)=>(b.old?pct(b.price,b.old):0)-(a.old?pct(a.price,a.old):0));
  else if(s==='nw')list.sort((a,b)=>b.id-a.id);
  return list;
}
function render(){
  const list=getFilt();const disp=list.slice(0,shown);
  document.getElementById('rc').textContent=disp.length;
  document.getElementById('rt').textContent=list.length;
  document.getElementById('lmBtn').style.display=shown>=list.length?'none':'inline-flex';
  const g=document.getElementById('shopG');
  if(!list.length){g.innerHTML=`<div class="no-res"><p>No products found</p><button class="btn btn-amber" onclick="clearAll()">Clear Filters</button></div>`;return}
  g.innerHTML=disp.map(pCard).join('');
}
function loadMore(){shown+=9;render()}
function clearAll(){
  qf='all';shown=9;
  document.getElementById('pmin').value='';document.getElementById('pmax').value='';
  ['ca','cw','cm','cacc','cb','r4','r45','d10','d20','d30'].forEach(id=>{const el=document.getElementById(id);if(el)el.checked=id==='ca'});
  document.getElementById('srt').value='';
  document.querySelectorAll('.qchip').forEach((c,i)=>c.classList.toggle('on',i===0));
  render();
}
render();
</script>
</body>
</html>
