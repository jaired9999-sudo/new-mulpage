<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Product — Velura</title>
<link rel="stylesheet" href="style.css">
<style>
.pd{display:grid;grid-template-columns:1fr 1fr;min-height:80vh;background:var(--white);align-items:start}
.pd-gal{position:sticky;top:62px;height:calc(100vh - 62px);
        background:linear-gradient(145deg,var(--sand) 0%,var(--warm2) 100%);
        display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px}
.pd-em{font-size:10rem;filter:drop-shadow(0 14px 36px rgba(0,0,0,.12));transition:transform .4s var(--ease);cursor:pointer}
.pd-em:hover{transform:scale(1.05) rotate(-2deg)}
.pd-thumbs{display:flex;gap:7px}
.pd-th{width:50px;height:50px;border:2px solid transparent;border-radius:3px;background:rgba(255,255,255,.7);
       display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:border-color .2s}
.pd-th.on,.pd-th:hover{border-color:var(--amber)}
.pd-info{padding:40px 44px;overflow-y:auto;max-height:calc(100vh - 62px)}
.pd-brand{font-size:.6rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
.pd-name{font-family:var(--serif);font-size:2.1rem;font-weight:400;line-height:1.1;margin-bottom:11px}
.pd-stars{display:flex;align-items:center;gap:9px;margin-bottom:16px;flex-wrap:wrap}
.pd-stars .st{color:#e5a020;font-size:.88rem}
.pd-stars .rv{font-size:.72rem;color:var(--slate)}
.pd-pr{display:flex;align-items:baseline;gap:11px;margin-bottom:5px;flex-wrap:wrap}
.pd-pr .price{font-size:1.65rem;font-weight:600}
.pd-pr .old{font-size:.92rem;color:var(--slate);text-decoration:line-through}
.pd-pr .db{padding:3px 9px;background:var(--green);color:var(--white);font-size:.62rem;font-weight:700;border-radius:3px}
.pd-save{font-size:.68rem;color:var(--green);font-weight:500;margin-bottom:20px}
.pd-div{border:none;border-top:1px solid var(--border);margin:18px 0}
.pd-lbl{font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-bottom:9px}
.sz-g{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:5px}
.sz{padding:7px 14px;border:1px solid var(--border);border-radius:3px;font-size:.71rem;
    letter-spacing:.04em;cursor:pointer;transition:all .15s;background:var(--white)}
.sz:hover{border-color:var(--ink)}.sz.on{background:var(--ink);color:var(--white);border-color:var(--ink)}
.sg-link{font-size:.62rem;color:var(--amber);text-decoration:underline;cursor:pointer}
.clr-r{display:flex;gap:9px;margin-bottom:20px}
.clr{width:27px;height:27px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;position:relative}
.clr.on{border-color:var(--amber);transform:scale(1.15)}
.clr.on::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid var(--amber);opacity:.7}
.qty-r{display:flex;align-items:center;gap:9px;margin-bottom:20px}
.qbtn{width:33px;height:33px;border:1px solid var(--border);border-radius:3px;
      display:flex;align-items:center;justify-content:center;font-size:1.05rem;
      cursor:pointer;font-weight:300;transition:all .15s;background:var(--white)}
.qbtn:hover{background:var(--ink);color:var(--white);border-color:var(--ink)}
.qv{font-size:.83rem;font-weight:600;min-width:24px;text-align:center}
.pd-acts{display:flex;gap:9px;margin-bottom:16px}
.pd-acts .btn{flex:1;padding:14px}
.pd-wb{padding:14px 16px;border:1px solid var(--border);background:var(--white);
       font-size:1.1rem;cursor:pointer;transition:all .2s;border-radius:3px}
.pd-wb:hover,.pd-wb.on{border-color:var(--red);color:var(--red)}
.pd-badges{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.pd-bi{display:flex;align-items:center;gap:4px;font-size:.63rem;color:var(--slate)}
.pd-desc{font-size:.74rem;line-height:1.9;color:var(--slate);margin-bottom:20px}
.acc{border-top:1px solid var(--border)}
.acc-it{border-bottom:1px solid var(--border)}
.acc-h{display:flex;justify-content:space-between;align-items:center;padding:12px 0;cursor:pointer;
       font-size:.7rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;transition:color .2s}
.acc-h:hover{color:var(--amber)}.acc-h .ar{transition:transform .25s;font-size:.73rem}
.acc-h.open .ar{transform:rotate(180deg)}
.acc-b{display:none;padding:0 0 13px;font-size:.72rem;line-height:1.85;color:var(--slate)}
.acc-b.open{display:block}
.rel{padding:60px 0}
@media(max-width:860px){
  .pd{grid-template-columns:1fr}.pd-gal{position:static;height:300px}
  .pd-info{padding:20px 18px;max-height:none}.pd-name{font-size:1.65rem}
}
</style>
</head>
<body data-page="Shop">
<div id="site-nav"></div>
<div style="background:var(--white);border-bottom:1px solid var(--border);padding:13px 48px">
  <div class="bcrumb" id="bc"><a href="index.html">Home</a><span class="sep">/</span><a href="shop.html">Shop</a><span class="sep">/</span><span id="bcn">Product</span></div>
</div>
<div class="pd" id="pdWrap"><div style="display:flex;align-items:center;justify-content:center;min-height:400px;color:var(--slate)">Loading…</div></div>
<section class="rel"><div class="wrap">
  <div class="sh"><div class="kick">You May Also Like</div><h2>Related <em>Products</em></h2><div class="rule"></div></div>
  <div class="pgrid" id="relG"></div>
</div></section>
<div id="site-footer"></div>
<script src="app.js"></script>
<script>
const pid=parseInt(new URLSearchParams(location.search).get('id'));
let p=PRODUCTS.find(x=>x.id===pid)||PRODUCTS[0];
let ss=p.sizes[0],sc=0,qty=1;
function render(){
  document.title=p.name+' — Velura';
  document.getElementById('bcn').textContent=p.name;
  const d=pct(p.price,p.old);const w=isWished(p.id);
  document.getElementById('pdWrap').innerHTML=`
    <div class="pd-gal">
      <div class="pd-em">${p.emoji}</div>
      <div class="pd-thumbs">${['🔍','💫','📦'].map((e,i)=>`<div class="pd-th${i===0?' on':''}">${e}</div>`).join('')}</div>
    </div>
    <div class="pd-info a1">
      <div class="pd-brand">${p.brand}</div>
      <h1 class="pd-name">${p.name}</h1>
      <div class="pd-stars"><span class="st">${starStr(p.rating)}</span><span>${p.rating}</span><span class="rv">${p.rev} reviews</span></div>
      <div class="pd-pr">
        <span class="price">${inr(p.price)}</span>
        ${p.old?`<span class="old">${inr(p.old)}</span><span class="db">${d}% OFF</span>`:''}
      </div>
      ${p.old?`<div class="pd-save">✓ You save ${inr(p.old-p.price)}</div>`:''}
      <hr class="pd-div">
      <div class="pd-lbl">Select Size <span class="sg-link">Size Guide</span></div>
      <div class="sz-g" id="szG">${p.sizes.map(s=>`<button class="sz${s===ss?' on':''}" onclick="pickSz('${s}')">${s}</button>`).join('')}</div>
      <hr class="pd-div">
      <div class="pd-lbl">Colour</div>
      <div class="clr-r" id="clrR">${p.colors.map((c,i)=>`<button class="clr${i===sc?' on':''}" style="background:${c}" onclick="pickClr(${i})" title="${c}"></button>`).join('')}</div>
      <div class="pd-lbl">Quantity</div>
      <div class="qty-r"><button class="qbtn" onclick="chQ(-1)">−</button><span class="qv" id="qv">1</span><button class="qbtn" onclick="chQ(1)">+</button></div>
      <div class="pd-acts">
        <button class="btn btn-amber" onclick="doAdd()">Add to Cart</button>
        <button class="pd-wb${w?' on':''}" id="wb" onclick="doW()">${w?'♥':'♡'}</button>
      </div>
      <a href="cart.html" class="btn btn-dark btn-full" onclick="doAdd()" style="margin-bottom:16px">Buy Now</a>
      <div class="pd-badges">
        <div class="pd-bi">🚚 Free delivery above ₹2,000</div>
        <div class="pd-bi">↩ 15-day returns</div>
        <div class="pd-bi">✓ 100% authentic</div>
        <div class="pd-bi">🔒 Secure payment</div>
      </div>
      <hr class="pd-div">
      <p class="pd-desc">${p.desc}</p>
      <div class="acc">
        ${[['Product Details','Premium quality materials. Quality-checked before dispatch.'],
           ['Size & Fit','Follows standard Indian sizing. For best fit refer to our size guide.'],
           ['Shipping','Free above ₹2,000. Standard: 5–7 days. Express: 2–3 days.'],
           ['Returns','15-day easy returns. Item must be unused with tags. Refund in 5–7 days.'],
          ].map(([t,b])=>`<div class="acc-it"><div class="acc-h" onclick="tog(this)">${t}<span class="ar">▾</span></div><div class="acc-b">${b}</div></div>`).join('')}
      </div>
    </div>`;
}
function pickSz(s){ss=s;document.querySelectorAll('.sz').forEach(b=>b.classList.toggle('on',b.textContent===s))}
function pickClr(i){sc=i;document.querySelectorAll('.clr').forEach((b,j)=>b.classList.toggle('on',j===i))}
function chQ(d){qty=Math.max(1,qty+d);document.getElementById('qv').textContent=qty}
function doAdd(){addToCart(p.id,ss,p.colors[sc],qty)}
function doW(){const on=toggleWish(p.id);const b=document.getElementById('wb');b.textContent=on?'♥':'♡';b.classList.toggle('on',on);showToast(on?'♥ Saved to Wishlist':'Removed')}
function tog(h){const b=h.nextElementSibling;const o=b.classList.contains('open');document.querySelectorAll('.acc-b').forEach(x=>x.classList.remove('open'));document.querySelectorAll('.acc-h').forEach(x=>x.classList.remove('open'));if(!o){b.classList.add('open');h.classList.add('open')}}
render();
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('relG').innerHTML=PRODUCTS.filter(x=>x.cat===p.cat&&x.id!==p.id).slice(0,4).map(pCard).join('');
});
</script>
</body>
</html>
