<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Checkout — Velura</title>
<link rel="stylesheet" href="../css/style.css">
<style>
.co-layout{display:grid;grid-template-columns:1fr 360px;gap:24px;padding:32px 48px 72px;max-width:1320px;margin:0 auto;align-items:start}
/* Step bar */
.step-bar{display:flex;margin-bottom:32px;border-bottom:1px solid var(--border)}
.step-it{
  flex:1;text-align:center;padding:13px 8px 11px;
  font-size:.62rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;
  color:var(--slate);border-bottom:2px solid transparent;transition:all .3s;
}
.step-it .sn{display:block;font-size:.65rem;font-weight:700;margin-bottom:2px;color:inherit}
.step-it.active{color:var(--ink);border-bottom-color:var(--amber)}
.step-it.done{color:var(--success);border-bottom-color:var(--success)}
/* Section */
.co-sec{margin-bottom:32px}
.co-sec-title{font-family:var(--font-display);font-size:1.35rem;font-weight:400;margin-bottom:18px;padding-bottom:12px;border-bottom:1px solid var(--border)}
/* Radio cards */
.radio-cards{display:flex;flex-direction:column;gap:10px}
.rc{
  display:flex;align-items:flex-start;gap:14px;
  padding:14px 16px;border:1px solid var(--border);border-radius:var(--r);
  cursor:pointer;transition:all .2s;
}
.rc:hover{border-color:var(--ink-soft)}
.rc.on{border-color:var(--amber);background:rgba(200,136,58,.04)}
.rc input[type=radio]{margin-top:2px;accent-color:var(--amber);width:15px;height:15px;flex-shrink:0;cursor:pointer}
.rc-main{font-size:.75rem;font-weight:600;letter-spacing:.04em}
.rc-sub{font-size:.65rem;color:var(--slate);margin-top:2px}
.rc-badge{margin-left:auto;padding:3px 9px;font-size:.58rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;border-radius:var(--r);flex-shrink:0}
.badge-free{background:var(--success);color:var(--white)}
.badge-fast{background:var(--amber);color:var(--white)}
/* Payment fields */
.pay-fields{margin-top:14px;padding:18px;background:var(--mist);border:1px solid var(--border);border-radius:var(--r)}
.card-logos{display:flex;gap:7px;margin-bottom:12px}
.card-logo{padding:4px 10px;border:1px solid var(--border);font-size:.6rem;font-weight:700;color:var(--slate);background:var(--white);border-radius:var(--r)}
/* Order summary panel */
.os-panel{background:var(--white);border:1px solid var(--border);border-radius:var(--r);padding:24px;position:sticky;top:76px}
.os-panel-title{font-family:var(--font-display);font-size:1.3rem;font-weight:400;margin-bottom:16px}
.osi{display:flex;justify-content:space-between;gap:12px;margin-bottom:9px;font-size:.72rem}
.osi .n{color:var(--ink-soft);flex:1}
.osi .p{font-weight:600;white-space:nowrap}
.os-hr{border:none;border-top:1px solid var(--border);margin:12px 0}
.os-row{display:flex;justify-content:space-between;font-size:.72rem;margin-bottom:8px}
.os-row .lbl{color:var(--slate)}
.os-total{display:flex;justify-content:space-between;font-size:.92rem;font-weight:700;padding-top:12px;border-top:1px solid var(--border);margin-top:6px}
/* Nav buttons */
.co-nav{display:flex;gap:10px;margin-top:8px}
.co-back{padding:13px 18px;border:1px solid var(--border);background:var(--white);font-size:.7rem;cursor:pointer;border-radius:var(--r);transition:all var(--t);color:var(--slate);font-family:var(--font-body)}
.co-back:hover{border-color:var(--ink);color:var(--ink)}
.co-next{flex:1;padding:14px}
/* Confirmation */
.confirm-wrap{max-width:560px;margin:0 auto;text-align:center;padding:48px 24px;grid-column:1/-1}
.confirm-icon{font-size:4rem;margin-bottom:18px}
.confirm-title{font-family:var(--font-display);font-size:2.8rem;font-weight:400;margin-bottom:8px}
.confirm-title em{font-style:italic;color:var(--amber)}
.confirm-sub{font-size:.74rem;color:var(--slate);line-height:1.8;margin-bottom:24px;max-width:400px;margin-left:auto;margin-right:auto}
.order-box{display:inline-block;padding:14px 28px;border:1px solid var(--border);background:var(--sand);margin-bottom:22px;border-radius:var(--r)}
.order-box .lbl{font-size:.6rem;color:var(--slate);text-transform:uppercase;letter-spacing:.15em;margin-bottom:4px}
.order-box .val{font-size:1.05rem;font-weight:700;color:var(--amber)}
.confirm-items{text-align:left;background:var(--sand);border:1px solid var(--border);padding:18px 20px;margin-bottom:20px;border-radius:var(--r)}
.ci-row{display:flex;justify-content:space-between;font-size:.73rem;padding:7px 0;border-bottom:1px solid var(--border);gap:12px}
.ci-row:last-child{border-bottom:none}
.confirm-details{text-align:left;background:var(--white);border:1px solid var(--border);padding:16px 20px;margin-bottom:24px;border-radius:var(--r);font-size:.73rem;line-height:1.85;color:var(--slate)}
.confirm-details .dl{font-size:.6rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--slate);margin-bottom:6px}
@media(max-width:1024px){.co-layout{grid-template-columns:1fr;padding:20px 24px 48px}.os-panel{position:static}}
@media(max-width:600px){.co-layout{padding:14px 14px 40px}.step-it{font-size:.55rem;padding:10px 4px}.form-row{grid-template-columns:1fr}.form-row .f-group.span2{grid-column:1}}
</style>
</head>
<body data-page="">
<div id="site-nav"></div>
<div class="page-hero">
  <div class="container">
    <div class="page-hero-inner anim-1">
      <div class="page-hero-tag">Secure Checkout</div>
      <h1><em>Checkout</em></h1>
      <div class="breadcrumb"><a href="../index.html">Home</a><span class="sep">/</span><a href="cart.html">Cart</a><span class="sep">/</span><span>Checkout</span></div>
    </div>
  </div>
</div>
<div class="co-layout" id="coLayout">
  <div id="formCol">Loading…</div>
  <div id="sumCol">Loading…</div>
</div>
<div id="site-footer"></div>
<script src="../js/app.js"></script>
<script>
let step=1;
let od=JSON.parse(sessionStorage.getItem('v_order')||'{}');
let promo=sessionStorage.getItem('v_promo')||'';

function saveOD(){sessionStorage.setItem('v_order',JSON.stringify(od))}

function getTotals(){
  const sub=cartTotal();
  const delCost={standard:sub>=2000?0:199,express:399,same:699}[od.del||'standard'];
  const disc2=promo?Math.round(sub*.1):0;
  return{sub,shipping:delCost,discount:disc2,total:sub+(delCost||0)-disc2};
}

function renderSummary(){
  const cart=getCart();
  const{sub,shipping,discount,total}=getTotals();
  document.getElementById('sumCol').innerHTML=`<div class="os-panel">
    <div class="os-panel-title">Order Summary</div>
    ${cart.map(i=>`<div class="osi"><span class="n">${i.emoji} ${i.name} (${i.size}) ×${i.qty}</span><span class="p">${inr(i.price*i.qty)}</span></div>`).join('')}
    <hr class="os-hr">
    <div class="os-row"><span class="lbl">Subtotal</span><span>${inr(sub)}</span></div>
    <div class="os-row"><span class="lbl">Shipping</span><span>${shipping===0?'<span style="color:var(--success)">FREE</span>':inr(shipping)}</span></div>
    ${discount?`<div class="os-row"><span class="lbl" style="color:var(--success)">Promo (VELURA10)</span><span style="color:var(--success)">−${inr(discount)}</span></div>`:''}
    <div class="os-total"><span>Total</span><span>${inr(total)}</span></div>
    <div style="margin-top:12px;font-size:.62rem;color:var(--slate)">🔒 SSL Secured &nbsp; ✓ Authentic &nbsp; ↩ Easy Returns</div>
  </div>`;
}

const stepsData=['Address','Delivery','Payment','Review'];
function stepBar(){
  return `<div class="step-bar">${stepsData.map((s,i)=>`<div class="step-it${step===i+1?' active':step>i+1?' done':''}"><span class="sn">${step>i+1?'✓':i+1}</span>${s}</div>`).join('')}</div>`;
}

function renderStep(){
  renderSummary();
  const{sub,shipping,total}=getTotals();
  const col=document.getElementById('formCol');

  if(step===1){
    col.innerHTML=stepBar()+`<div class="co-sec">
      <div class="co-sec-title">Delivery Address</div>
      <div class="form-row">
        <div class="f-group"><label>First Name *</label><input class="f-inp" id="ff" placeholder="Priya" value="${od.fn||''}"></div>
        <div class="f-group"><label>Last Name *</label><input class="f-inp" id="fl" placeholder="Sharma" value="${od.ln||''}"></div>
        <div class="f-group span2"><label>Email *</label><input class="f-inp" id="fe" type="email" placeholder="priya@email.com" value="${od.email||''}"></div>
        <div class="f-group span2"><label>Mobile *</label><input class="f-inp" id="fp" placeholder="+91 98765 43210" value="${od.phone||''}"></div>
        <div class="f-group span2"><label>Address Line 1 *</label><input class="f-inp" id="fa1" placeholder="Flat / House No., Building" value="${od.a1||''}"></div>
        <div class="f-group span2"><label>Address Line 2</label><input class="f-inp" id="fa2" placeholder="Street, Area" value="${od.a2||''}"></div>
        <div class="f-group"><label>City *</label><input class="f-inp" id="fc" placeholder="Hyderabad" value="${od.city||''}"></div>
        <div class="f-group"><label>State *</label>
          <select class="f-sel" id="fst">
            <option value="">Select State</option>
            ${['Telangana','Andhra Pradesh','Maharashtra','Karnataka','Tamil Nadu','Delhi','Rajasthan','Gujarat','West Bengal','Punjab','Kerala','Goa','Uttar Pradesh','Madhya Pradesh'].map(s=>`<option${od.state===s?' selected':''}>${s}</option>`).join('')}
          </select>
        </div>
        <div class="f-group"><label>PIN Code *</label><input class="f-inp" id="fpin" placeholder="500001" maxlength="6" value="${od.pin||''}"></div>
        <div class="f-group"><label>Country</label><input class="f-inp" value="India" readonly style="background:var(--warm);color:var(--slate)"></div>
      </div>
    </div>
    <div class="co-nav"><button class="co-next btn btn-amber" onclick="validateAddr()">Continue to Delivery →</button></div>`;
  }
  else if(step===2){
    col.innerHTML=stepBar()+`<div class="co-sec">
      <div class="co-sec-title">Choose Delivery</div>
      <div class="radio-cards">
        <label class="rc${!od.del||od.del==='standard'?' on':''}">
          <input type="radio" name="dl" value="standard" ${!od.del||od.del==='standard'?'checked':''} onchange="od.del='standard';updateRC(this);renderSummary()">
          <div><div class="rc-main">Standard Delivery</div><div class="rc-sub">5–7 business days</div></div>
          ${sub>=2000?'<span class="rc-badge badge-free">FREE</span>':''}
        </label>
        <label class="rc${od.del==='express'?' on':''}">
          <input type="radio" name="dl" value="express" ${od.del==='express'?'checked':''} onchange="od.del='express';updateRC(this);renderSummary()">
          <div><div class="rc-main">Express Delivery</div><div class="rc-sub">2–3 business days · ₹399</div></div>
          <span class="rc-badge badge-fast">FAST</span>
        </label>
        <label class="rc${od.del==='same'?' on':''}">
          <input type="radio" name="dl" value="same" ${od.del==='same'?'checked':''} onchange="od.del='same';updateRC(this);renderSummary()">
          <div><div class="rc-main">Same Day Delivery</div><div class="rc-sub">Select cities only · ₹699</div></div>
        </label>
      </div>
    </div>
    <div class="co-sec">
      <div class="co-sec-title">Promo Code</div>
      <div style="display:flex;gap:0">
        <input class="f-inp" style="border-radius:var(--r) 0 0 var(--r);border-right:none" placeholder="Try: VELURA10" id="promoIn" value="${promo}">
        <button onclick="applyPromo()" style="padding:11px 18px;background:var(--ink);color:var(--white);font-size:.64rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;border:none;cursor:pointer;border-radius:0 var(--r) var(--r) 0;font-family:var(--font-body)">Apply</button>
      </div>
      ${promo?`<div style="font-size:.64rem;color:var(--success);margin-top:7px;font-weight:500">✓ VELURA10 applied — 10% off!</div>`:''}
    </div>
    <div class="co-nav">
      <button class="co-back" onclick="step=1;renderStep()">← Back</button>
      <button class="co-next btn btn-amber" onclick="step=3;saveOD();renderStep()">Continue to Payment →</button>
    </div>`;
  }
  else if(step===3){
    col.innerHTML=stepBar()+`<div class="co-sec">
      <div class="co-sec-title">Payment Method</div>
      <div class="radio-cards">
        <label class="rc${!od.pay||od.pay==='card'?' on':''}">
          <input type="radio" name="pm" value="card" ${!od.pay||od.pay==='card'?'checked':''} onchange="od.pay='card';updateRC(this);renderPayFields('card')">
          <div><div class="rc-main">Credit / Debit Card</div><div class="rc-sub">Visa · MC · Amex · RuPay</div></div>
        </label>
        <label class="rc${od.pay==='upi'?' on':''}">
          <input type="radio" name="pm" value="upi" ${od.pay==='upi'?'checked':''} onchange="od.pay='upi';updateRC(this);renderPayFields('upi')">
          <div><div class="rc-main">UPI</div><div class="rc-sub">GPay · PhonePe · Paytm · BHIM</div></div>
        </label>
        <label class="rc${od.pay==='nb'?' on':''}">
          <input type="radio" name="pm" value="nb" ${od.pay==='nb'?'checked':''} onchange="od.pay='nb';updateRC(this);renderPayFields('nb')">
          <div><div class="rc-main">Net Banking</div><div class="rc-sub">All major Indian banks</div></div>
        </label>
        <label class="rc${od.pay==='cod'?' on':''}">
          <input type="radio" name="pm" value="cod" ${od.pay==='cod'?'checked':''} onchange="od.pay='cod';updateRC(this);renderPayFields('cod')">
          <div><div class="rc-main">Cash on Delivery</div><div class="rc-sub">Pay when order arrives</div></div>
        </label>
      </div>
      <div id="payFields"></div>
    </div>
    <div class="co-nav">
      <button class="co-back" onclick="step=2;renderStep()">← Back</button>
      <button class="co-next btn btn-amber" onclick="validatePay()">Review Order →</button>
    </div>`;
    renderPayFields(od.pay||'card');
  }
  else if(step===4){
    const cart=getCart();
    const{total}=getTotals();
    const delMap={standard:'5–7 business days',express:'2–3 business days',same:'Same Day'};
    const payMap={card:`Card ····${od.cardLast||'0000'}`,upi:`UPI · ${od.upiId||''}`,nb:`Net Banking · ${od.bank||''}`,cod:'Cash on Delivery'};
    col.innerHTML=stepBar()+`<div class="co-sec">
      <div class="co-sec-title">Review Your Order</div>
      <div style="background:var(--sand);border:1px solid var(--border);padding:16px 18px;margin-bottom:14px;border-radius:var(--r)">
        <div style="font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-bottom:10px">Delivery Address</div>
        <div style="font-size:.74rem;line-height:1.8;color:var(--ink-soft)">${od.fn} ${od.ln}<br>${od.a1}${od.a2?', '+od.a2:''}<br>${od.city}, ${od.state} – ${od.pin}<br>${od.phone} · ${od.email}</div>
      </div>
      <div style="background:var(--sand);border:1px solid var(--border);padding:16px 18px;margin-bottom:14px;border-radius:var(--r);display:flex;gap:28px;flex-wrap:wrap">
        <div><div style="font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-bottom:4px">Delivery</div><div style="font-size:.74rem">🚚 ${delMap[od.del||'standard']}</div></div>
        <div><div style="font-size:.58rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-bottom:4px">Payment</div><div style="font-size:.74rem">💳 ${payMap[od.pay||'card']}</div></div>
      </div>
    </div>
    <div class="co-nav">
      <button class="co-back" onclick="step=3;renderStep()">← Back</button>
      <button class="co-next btn btn-amber" onclick="placeOrder()">Place Order · ${inr(total)} →</button>
    </div>`;
  }
}

function updateRC(inp){
  inp.closest('.radio-cards').querySelectorAll('.rc').forEach(r=>r.classList.remove('on'));
  inp.closest('.rc').classList.add('on');
}

function renderPayFields(m){
  const el=document.getElementById('payFields');if(!el)return;
  if(m==='card'){
    el.innerHTML=`<div class="pay-fields">
      <div class="card-logos"><div class="card-logo">VISA</div><div class="card-logo">MC</div><div class="card-logo">AMEX</div><div class="card-logo">RuPay</div></div>
      <div class="form-row">
        <div class="f-group span2"><label>Card Number *</label><input class="f-inp" id="cn" placeholder="1234  5678  9012  3456" maxlength="19" oninput="this.value=this.value.replace(/\D/g,'').replace(/(.{4})/g,'$1 ').trim().slice(0,19)" value="${od.cardNum||''}"></div>
        <div class="f-group span2"><label>Cardholder Name *</label><input class="f-inp" id="cname" placeholder="As printed on card" value="${od.cardName||''}"></div>
        <div class="f-group"><label>Expiry (MM/YY) *</label><input class="f-inp" id="cexp" placeholder="12/28" maxlength="5" value="${od.cardExp||''}"></div>
        <div class="f-group"><label>CVV *</label><input class="f-inp" id="ccvv" type="password" placeholder="•••" maxlength="4"></div>
      </div>
      <div style="text-align:center;font-size:.62rem;color:var(--slate);margin-top:10px">🔒 256-bit SSL encryption — Your card is safe</div>
    </div>`;
  }else if(m==='upi'){
    el.innerHTML=`<div class="pay-fields"><div class="f-group"><label>UPI ID *</label><input class="f-inp" id="upiId" placeholder="yourname@upi" value="${od.upiId||''}"></div><div style="font-size:.63rem;color:var(--slate);margin-top:7px">GPay · PhonePe · Paytm · BHIM · CRED</div></div>`;
  }else if(m==='nb'){
    el.innerHTML=`<div class="pay-fields"><div class="f-group"><label>Select Bank *</label><select class="f-sel" id="bnk"><option value="">— Choose your bank —</option>${['SBI','HDFC Bank','ICICI Bank','Axis Bank','Kotak Mahindra','Bank of Baroda','PNB','Canara Bank','IndusInd Bank'].map(b=>`<option${od.bank===b?' selected':''}>${b}</option>`).join('')}</select></div></div>`;
  }else{
    el.innerHTML=`<div class="pay-fields" style="font-size:.73rem;color:var(--slate);line-height:1.8">Pay in cash when your order arrives. Available for orders under ₹50,000. Our delivery partner will provide a receipt.</div>`;
  }
}

function applyPromo(){
  const v=document.getElementById('promoIn')?.value.trim().toUpperCase();
  if(v==='VELURA10'){promo='VELURA10';sessionStorage.setItem('v_promo','VELURA10');toast('✓ 10% discount applied!');renderStep()}
  else toast('Invalid promo code. Try VELURA10');
}

function validateAddr(){
  const map={ff:'fn',fl:'ln',fe:'email',fp:'phone',fa1:'a1',fc:'city',fst:'state',fpin:'pin'};
  let ok=true;
  for(const[id,key]of Object.entries(map)){
    const el=document.getElementById(id);if(!el)continue;
    const v=el.value.trim();
    if(!v){el.classList.add('err');ok=false}else{el.classList.remove('err');od[key]=v}
  }
  const a2=document.getElementById('fa2');if(a2)od.a2=a2.value.trim();
  if(!ok){toast('Please fill all required fields');return}
  if(!/\S+@\S+\.\S+/.test(od.email)){document.getElementById('fe').classList.add('err');toast('Please enter a valid email');return}
  if(!/^\d{6}$/.test(od.pin)){document.getElementById('fpin').classList.add('err');toast('Please enter a valid 6-digit PIN');return}
  step=2;saveOD();renderStep();
}

function validatePay(){
  const pm=document.querySelector('input[name=pm]:checked')?.value||'card';
  od.pay=pm;
  if(pm==='card'){
    const num=document.getElementById('cn')?.value.replace(/\s/g,'');
    const nm=document.getElementById('cname')?.value;
    const ex=document.getElementById('cexp')?.value;
    const cv=document.getElementById('ccvv')?.value;
    if(!num||num.length<16||!nm||!ex||!cv){toast('Please complete all card details');return}
    od.cardNum=num;od.cardName=nm;od.cardExp=ex;od.cardLast=num.slice(-4);
  }else if(pm==='upi'){
    const u=document.getElementById('upiId')?.value;
    if(!u||!u.includes('@')){toast('Please enter a valid UPI ID');return}
    od.upiId=u;
  }else if(pm==='nb'){
    const b=document.getElementById('bnk')?.value;
    if(!b){toast('Please select your bank');return}
    od.bank=b;
  }
  step=4;saveOD();renderStep();
}

function placeOrder(){
  const btn=document.querySelector('.co-next');
  if(btn){btn.textContent='Processing…';btn.disabled=true}
  const oid='VLR'+Date.now().toString().slice(-8).toUpperCase();
  sessionStorage.setItem('v_oid',oid);
  sessionStorage.setItem('v_confirmed',JSON.stringify(getCart()));
  const{total}=getTotals();
  setTimeout(()=>{
    localStorage.removeItem('v_cart');
    showConfirmation(oid,total);
  },2000);
}

function showConfirmation(oid,total){
  const cart=JSON.parse(sessionStorage.getItem('v_confirmed')||'[]');
  const delMap={standard:'5–7 business days',express:'2–3 business days',same:'Today (Same Day)'};
  const payMap={card:`Card ending ····${od.cardLast||'0000'}`,upi:`UPI · ${od.upiId}`,nb:`Net Banking · ${od.bank}`,cod:'Cash on Delivery'};
  document.getElementById('coLayout').innerHTML=`<div class="confirm-wrap anim-1">
    <div class="confirm-icon">🎉</div>
    <div class="confirm-title">Order <em>Confirmed!</em></div>
    <p class="confirm-sub">Thank you, ${od.fn}! Your order has been placed. A confirmation email has been sent to <strong>${od.email}</strong></p>
    <div class="order-box"><div class="lbl">Order ID</div><div class="val">${oid}</div></div>
    <div class="confirm-items">
      <div style="font-size:.6rem;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--slate);margin-bottom:12px">Items Ordered</div>
      ${cart.map(i=>`<div class="ci-row"><span>${i.emoji} ${i.name} (${i.size}) ×${i.qty}</span><span style="font-weight:600">${inr(i.price*i.qty)}</span></div>`).join('')}
      <div style="display:flex;justify-content:space-between;font-size:.88rem;font-weight:700;padding-top:12px"><span>Total Paid</span><span>${inr(total)}</span></div>
    </div>
    <div class="confirm-details">
      <div class="dl">Delivery & Payment</div>
      📍 ${od.a1}, ${od.city}, ${od.state} – ${od.pin}<br>
      🚚 ${delMap[od.del||'standard']}<br>
      💳 ${payMap[od.pay||'card']||''}
    </div>
    <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">
      <a href="../index.html" class="btn btn-amber">Continue Shopping</a>
      <a href="shop.html" class="btn btn-outline">Explore More</a>
    </div>
  </div>`;
  _refreshCartUI();
}

// Init
if(!getCart().length&&step<4){
  document.getElementById('formCol').innerHTML=`<div style="text-align:center;padding:60px 20px"><p style="font-family:var(--font-display);font-size:1.8rem;font-weight:400;color:var(--slate);margin-bottom:20px">Your cart is empty</p><a href="shop.html" class="btn btn-amber">Start Shopping</a></div>`;
  document.getElementById('sumCol').innerHTML='';
}else{renderStep()}
</script>
</body>
</html>
