<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <title>Checkout | L'ELITE</title>
</head>
<body>
    <div class="container" style="max-width: 500px;">
        <h2 style="text-align: center;">Shipping Details</h2>
        <form onsubmit="completePurchase(event)">
            <label>Full Name</label>
            <input type="text" placeholder="John Doe" required>
            
            <label>Email Address</label>
            <input type="email" placeholder="john@luxury.com" required>
            
            <label>Shipping Address</label>
            <input type="text" placeholder="123 Luxury Lane" required>
            
            <button type="submit" class="btn" style="width: 100%;">Place Order & Purchase</button>
        </form>
    </div>
    <script src="script.js"></script>
</body>
</html>
